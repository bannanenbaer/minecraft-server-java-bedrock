services:
  minecraft:
    image: itzg/minecraft-server
    env_file:
      - server.config
    environment:
      EULA: "TRUE"
      REMOVE_OLD_MODS: "TRUE"
    ports:
      - "25565:25565"        # Java Edition
      - "19132:19132/udp"    # Bedrock Edition (via GeyserMC)
    volumes:
      - ./data:/data
    restart: unless-stopped
    stdin_open: true
    tty: true
    healthcheck:
      test: mc-health
      start_period: 2m
      interval: 10s
      retries: 20
